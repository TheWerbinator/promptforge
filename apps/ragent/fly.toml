# fly.toml for promptforge-ragent (apps/ragent).
# See https://fly.io/docs/reference/configuration/.
#
# No [deploy] release_command: the DB schema + migration history are owned by
# apps/api (single shared Postgres). ragent only reads/writes via the shared
# models, it never migrates.

app = 'promptforge-ragent'
primary_region = 'ord'
kill_signal = 'SIGINT'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile'

[env]
  PF_LOG_LEVEL = 'INFO'

[processes]
  web = 'uvicorn promptforge_ragent.main:app --host 0.0.0.0 --port 8000'
  # Claims kind="ingest_document" off the shared Postgres queue. Same image, second
  # scale dial — scale to 0 when no ingestion is happening (like apps/api's worker).
  ingest-worker = 'python -m promptforge_ragent.workers.ingest_worker'

[[services]]
  protocol = 'tcp'
  internal_port = 8000
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['web']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[services.http_checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'get'
    path = '/health'
    protocol = 'http'

# 1 GB, not 512 MB: litellm alone is ~200 MB RSS, and both processes load it (the
# web/chat agent + the worker's embed-on-ingest), plus documents/vectors in flight.
# 512 MB OOM-killed the seed (which also loads litellm) when it ran alongside the
# worker. Both auto-scale to 0 when idle, so the larger size only costs when active.
[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  processes = ['web']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  processes = ['ingest-worker']
