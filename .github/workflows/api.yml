name: api

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"

defaults:
  run:
    working-directory: apps/api

jobs:
  lint-type-unit:
    name: lint + types + unit tests (py ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/pyproject.toml"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy --strict promptforge_api

      - name: Pytest (unit only)
        # No coverage gate here: route/service code is covered by e2e+integration,
        # not unit, so a package-wide threshold on unit-alone is meaningless. The
        # real gate runs on the full suite in the `tests` job below. Coverage is
        # still emitted for the per-flag codecov upload.
        run: uv run pytest -m "not integration and not e2e" --cov --cov-report=xml

      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          flags: api-unit
          fail_ci_if_error: false

  tests:
    name: full suite + coverage gate (Postgres via testcontainers)
    runs-on: ubuntu-latest
    needs: lint-type-unit
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/pyproject.toml"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Pytest (full suite + coverage gate)
        # Runs unit + integration + e2e together so coverage reflects the whole
        # package (route/service code is exercised by e2e). Gate at 80% — actual
        # is ~85%; the margin absorbs minor drift without nagging failures.
        run: uv run pytest --cov --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          flags: api-integration
          fail_ci_if_error: false

  deploy:
    name: deploy to fly.io
    runs-on: ubuntu-latest
    # Only push events on main, and only after all tests pass. PRs don't deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-type-unit, tests]
    concurrency:
      # If a second commit lands while a deploy is in flight, queue the new one
      # and cancel any earlier in-progress deploy for the same ref.
      group: fly-deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        # The workflow-level `defaults.run.working-directory: apps/api` already
        # puts us in apps/api, so paths here are relative to it (passing apps/api
        # again chdir'd into apps/api/apps/api). fly.toml + Dockerfile are in cwd.
        # release_command in fly.toml runs migrations + seed before traffic shifts;
        # on failure the deploy aborts with old machines still serving.
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
