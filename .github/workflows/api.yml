name: api

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"

defaults:
  run:
    working-directory: apps/api

jobs:
  lint-type-unit:
    name: lint + types + unit tests (py ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/pyproject.toml"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy --strict promptforge_api

      - name: Pytest (unit only)
        # Coverage gate trails the project target; tightens as later phases add
        # tests that cover defensive branches in auth/refresh/api-keys.
        run: uv run pytest -m "not integration and not e2e" --cov --cov-report=xml --cov-fail-under=70

      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          flags: api-unit
          fail_ci_if_error: false

  integration:
    name: integration tests (Postgres via testcontainers)
    runs-on: ubuntu-latest
    needs: lint-type-unit
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/pyproject.toml"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Pytest (integration + e2e)
        run: uv run pytest -m "integration or e2e" --cov --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          flags: api-integration
          fail_ci_if_error: false
