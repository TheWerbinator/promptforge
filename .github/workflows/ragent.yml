name: ragent

on:
  push:
    branches: [main]
    paths:
      - "apps/ragent/**"
      - ".github/workflows/ragent.yml"
  pull_request:
    paths:
      - "apps/ragent/**"
      - ".github/workflows/ragent.yml"

defaults:
  run:
    working-directory: apps/ragent

jobs:
  lint-type-unit:
    name: lint + types + unit tests (py ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/ragent/pyproject.toml"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies
        # `--extra dev`, not `--all-extras`: the `rerank` extra pulls
        # sentence-transformers/torch (~GBs) and is disabled by default. Its code
        # path is lazy-imported + mocked in tests, so CI needs neither.
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy --strict promptforge_ragent

      - name: Pytest (unit only)
        run: uv run pytest -m "not integration and not e2e" --cov --cov-report=xml

      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: apps/ragent/coverage.xml
          flags: ragent-unit
          fail_ci_if_error: false

  tests:
    name: full suite (Postgres+pgvector via testcontainers)
    runs-on: ubuntu-latest
    needs: lint-type-unit
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/ragent/pyproject.toml"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Pytest (full suite)
        # Unit + integration + e2e. testcontainers pulls pgvector/pgvector:pg17;
        # all external calls (litellm, embeddings, sentence-transformers) are
        # mocked, so no provider secrets are needed in CI.
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: apps/ragent/coverage.xml
          flags: ragent
          fail_ci_if_error: false

  deploy:
    name: deploy to fly.io
    runs-on: ubuntu-latest
    # Only push events on main, after lint + the full suite pass. PRs don't deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-type-unit, tests]
    concurrency:
      group: fly-deploy-ragent-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        # defaults.run.working-directory is apps/ragent, so fly.toml + Dockerfile
        # are in cwd. ragent has NO release_command (it never migrates; the corpora
        # seed is a documented one-time manual step — see docs/DEPLOY.md).
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
