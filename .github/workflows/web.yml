name: web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web.yml"

defaults:
  run:
    working-directory: apps/web

jobs:
  lint-type-build:
    name: lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Builds + starts the app with MSW enabled (playwright.config webServer) and
      # runs the suite against the in-process mock — no live backend needed.
      - name: Run E2E
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

# Deploy is handled by Vercel's native GitHub integration (not GitHub Actions).
